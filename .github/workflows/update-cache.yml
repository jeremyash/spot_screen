name: Update spot forecast cache

on:
  schedule:
    - cron: "0,30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: superfog-cache
  cancel-in-progress: false

jobs:
  update-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-repo
          fetch-depth: 0

      - name: Check out cache branch
        uses: actions/checkout@v4
        with:
          ref: cache-data
          path: cache-repo
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      - name: Install R dependencies with cache
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1
          packages: |
            any::tidyverse
            any::lubridate
            any::kableExtra
            any::lutz
            any::httr2
            any::jsonlite
            any::sf

      - name: Run cache builder
        working-directory: main-repo
        run: Rscript update_cache.R

      - name: Copy generated cache to cache branch checkout
        run: |
          mkdir -p cache-repo/cache
          cp -f main-repo/cache/superfog_cache.rds cache-repo/cache/superfog_cache.rds

      - name: Commit updated cache if changed
        working-directory: cache-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cache/superfog_cache.rds
          git diff --staged --quiet || git commit -m "Update superfog cache"
          git push origin cache-data