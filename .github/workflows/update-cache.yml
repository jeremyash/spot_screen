name: Update spot forecast cache

on:
  schedule:
    - cron: "0,30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: superfog-cache
  cancel-in-progress: false

jobs:
  update-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Check out main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-repo
          fetch-depth: 0

      - name: Check out cache branch
        uses: actions/checkout@v4
        with:
          ref: cache-data
          path: cache-repo
          fetch-depth: 0

      - name: Check run window
        id: timecheck
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run detected — forcing cache build."
            echo "run_cache=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          HOUR=$(TZ="America/New_York" date +%H)
          echo "Current Eastern hour: $HOUR"

          if [ "$HOUR" -lt 6 ] || [ "$HOUR" -gt 10 ]; then
            echo "Outside forecast window — skipping cache build."
            echo "run_cache=false" >> $GITHUB_OUTPUT
          else
            echo "Inside forecast window."
            echo "run_cache=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up R
        if: steps.timecheck.outputs.run_cache == 'true'
        uses: r-lib/actions/setup-r@v2

      - name: Install system libraries
        if: steps.timecheck.outputs.run_cache == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      - name: Install R dependencies (cached)
        if: steps.timecheck.outputs.run_cache == 'true'
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1
          packages: |
            any::tidyverse
            any::lubridate
            any::kableExtra
            any::lutz
            any::httr2
            any::jsonlite
            any::sf

      - name: Run cache builder
        if: steps.timecheck.outputs.run_cache == 'true'
        working-directory: main-repo
        env:
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: |
          Rscript update_cache.R

      - name: Verify built cache file exists and show timestamp
        if: steps.timecheck.outputs.run_cache == 'true'
        working-directory: main-repo
        run: |
          echo "Working directory:"
          pwd

          echo "Contents of main-repo:"
          ls -la

          echo "Contents of cache directory:"
          ls -la cache || true

          if [ ! -f cache/superfog_cache.rds ]; then
            echo "ERROR: cache/superfog_cache.rds was not created"
            exit 1
          fi

          Rscript -e 'x <- readRDS("cache/superfog_cache.rds"); cat("main-repo timestamp:", as.character(x$last_refresh), "\n")'

      - name: Copy generated cache
        if: steps.timecheck.outputs.run_cache == 'true'
        run: |
          mkdir -p cache-repo/cache
          cp -f main-repo/cache/superfog_cache.rds cache-repo/cache/superfog_cache.rds

      - name: Verify copied cache file exists and show timestamp
        if: steps.timecheck.outputs.run_cache == 'true'
        working-directory: cache-repo
        run: |
          echo "Working directory:"
          pwd

          echo "Contents of cache-repo:"
          ls -la

          echo "Contents of cache directory:"
          ls -la cache || true

          if [ ! -f cache/superfog_cache.rds ]; then
            echo "ERROR: cache/superfog_cache.rds was not copied"
            exit 1
          fi

          Rscript -e 'x <- readRDS("cache/superfog_cache.rds"); cat("cache-repo timestamp:", as.character(x$last_refresh), "\n")'

      - name: Show git status
        if: steps.timecheck.outputs.run_cache == 'true'
        working-directory: cache-repo
        run: |
          git status
          git diff -- cache/superfog_cache.rds || true

      - name: Commit updated cache
        if: steps.timecheck.outputs.run_cache == 'true'
        working-directory: cache-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add cache/superfog_cache.rds

          git diff --staged --quiet || git commit -m "Update superfog cache"

          git push origin cache-data