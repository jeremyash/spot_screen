\f0\fs24 \cf0 name: Archive spot forecast text\
\
on:\
  schedule:\
    - cron: \'9323 23 * * *"\
  workflow_dispatch:\
\
permissions:\
  contents: write\
\
concurrency:\
  group: archive-product-text\
  cancel-in-progress: false\
\
jobs:\
  archive-text:\
    runs-on: ubuntu-latest\
\
    steps:\
      - name: Check out main branch\
        uses: actions/checkout@v4\
        with:\
          ref: main\
          path: main-repo\
\
      - name: Check out cache branch\
        uses: actions/checkout@v4\
        with:\
          ref: cache-data\
          path: cache-repo\
\
      - name: Set up R\
        uses: r-lib/actions/setup-r@v2\
\
      - name: Install system libraries\
        run: |\
          sudo apt-get update\
          sudo apt-get install -y \\\
            libgdal-dev \\\
            libgeos-dev \\\
            libproj-dev \\\
            libudunits2-dev \\\
            libcurl4-openssl-dev \\\
            libssl-dev \\\
            libxml2-dev\
\
      - name: Install R dependencies\
        uses: r-lib/actions/setup-r-dependencies@v2\
        with:\
          packages: |\
            any::tidyverse\
            any::sf\
            any::lubridate\
            any::fs\
\
      - name: Copy latest cache into main repo\
        run: |\
          mkdir -p main-repo/cache\
          cp cache-repo/cache/superfog_cache.rds main-repo/cache/superfog_cache.rds\
\
      - name: Build text archive\
        working-directory: main-repo\
        run: |\
          Rscript archive_product_text.R\
\
      - name: Copy text archive to cache branch\
        run: |\
          mkdir -p cache-repo/text-archive\
          cp -R main-repo/text-archive/. cache-repo/text-archive/\
\
      - name: Commit archived text files\
        working-directory: cache-repo\
        run: |\
          git config user.name "github-actions[bot]"\
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"\
\
          git add text-archive/\
\
          git diff --staged --quiet || git commit -m "Archive spot forecast text files"\
\
          git push origin cache-data}